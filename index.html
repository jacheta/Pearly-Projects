<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pearly — Payments Report</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#FFFFFF;font-family:'Inter',sans-serif;color:#1E2D4A}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#F1F5F9}
::-webkit-scrollbar-thumb{background:#C2D7FF;border-radius:3px}
.tabs button{background:transparent;border:1px solid transparent;color:#64748B;border-radius:8px;padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif}
.tabs button.active{background:rgba(0,65,192,.08);border-color:rgba(0,65,192,.25);color:#0041C0}
.tabs button:hover:not(.active){color:#335EEA}
.cards{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:28px}
.card{background:#EFF4FF;border:1px solid #D6E4FF;border-radius:12px;padding:24px 20px;flex:1;min-width:200px}
.card.accent{border-color:#8EA9FF;border-left:4px solid #0041C0}
.card-label{color:#64748B;font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px}
.card-value{font-size:24px;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:-.02em;color:#0041C0}
.card.accent .card-value{color:#0041C0}
.card-sub{color:#64748B;font-size:12px;margin-top:4px}
.section{background:#EFF4FF;border:1px solid #D6E4FF;border-radius:12px;padding:24px;margin-bottom:24px}
.section h2{font-size:18px;font-weight:700;margin-bottom:4px;color:#0041C0}
.section .sub{color:#64748B;font-size:13px;margin-bottom:16px}
.row{display:flex;gap:20px;margin-bottom:24px;flex-wrap:wrap}
.row>.section{margin-bottom:0}
table{width:100%;border-collapse:collapse;font-size:13px;border-spacing:0}
th{text-align:right;padding:10px 12px;color:#64748B;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.05em;border-bottom:2px solid #D6E4FF}
th:first-child{text-align:left}
td{padding:10px 12px;text-align:right;border-bottom:1px solid #E8EEFF;color:#1E2D4A}
td:first-child{text-align:left}
.mono{font-family:'JetBrains Mono',monospace;font-size:12px}
.green{color:#42BA96}.red{color:#DC2626}.purple{color:#335EEA}.dim{color:#64748B}.bold{font-weight:700}
.total-row td{border-top:2px solid #D6E4FF;border-bottom:none;padding:12px;font-weight:700;color:#0041C0}
canvas{max-width:100%}
.funnel{display:flex;gap:20px;align-items:center;justify-content:center;padding:20px 0;flex-wrap:wrap}
.funnel-item{text-align:center}.funnel-label{color:#64748B;font-size:12px;font-weight:600;text-transform:uppercase;margin-bottom:6px}
.funnel-value{font-size:24px;font-weight:700;font-family:'JetBrains Mono',monospace}
.funnel-sub{color:#64748B;font-size:12px;margin-top:4px}.funnel-arrow{color:#C2D7FF;font-size:28px;padding:0 8px}
.legend{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:12px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px}
.legend-dot{width:10px;height:10px;border-radius:3px}
.legend-val{color:#1E2D4A;font-weight:600;font-family:'JetBrains Mono',monospace;font-size:11px}
.legend-label{color:#64748B}
.hidden{display:none}
.click-hint{color:#8EA9FF;font-size:11px;text-align:center;margin-top:8px;font-style:italic}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,41,120,.3);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.show{display:flex}
.modal{background:#fff;border:1px solid #D6E4FF;border-radius:16px;padding:28px;max-width:700px;width:90%;max-height:80vh;overflow-y:auto;position:relative;box-shadow:0 24px 48px rgba(0,41,120,.15)}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:1px solid #D6E4FF;color:#64748B;width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif}
.modal-close:hover{background:#EFF4FF;color:#0041C0}
.modal h3{font-size:17px;font-weight:700;margin-bottom:4px;color:#0041C0}
.modal .sub{color:#64748B;font-size:13px;margin-bottom:16px}
#uploadScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px}
.upload-box{background:#EFF4FF;border:2px dashed #C2D7FF;border-radius:16px;padding:60px 40px;text-align:center;max-width:500px;width:100%;cursor:pointer;transition:all .2s}
.upload-box:hover,.upload-box.dragover{border-color:#0041C0;background:#E3EDFF}
.upload-box h2{font-size:20px;margin-bottom:8px;color:#0041C0}
.upload-box p{color:#64748B;font-size:14px;margin-bottom:20px}
.upload-btn{background:#0041C0;color:#fff;border:none;padding:12px 28px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
.upload-btn:hover{background:#002E8A}
#uploadStatus{margin-top:16px;color:#64748B;font-size:13px}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid #D6E4FF;border-top-color:#0041C0;border-radius:50%;animation:spin .6s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
#dashboard{display:none}
#newFileBtn{background:rgba(0,65,192,.08);border:1px solid rgba(0,65,192,.25);color:#0041C0;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;margin-left:auto}
#newFileBtn:hover{background:rgba(0,65,192,.15)}
@media print{
  body{background:#fff !important;-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important;color-adjust:exact !important}
  *{-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important}
  #uploadScreen,.modal-overlay{display:none !important}
  .section,.card,.cards{break-inside:avoid}
  .click-hint{display:none}
  @page{margin:0.3in;size:letter}
}
</style>
</head>

<script>
var charts=[];var D={};
function fmt(v){return '$'+Number(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtK(v){return '$'+(v>=1e6?(v/1e6).toFixed(1)+'M':v>=1e3?(v/1e3).toFixed(1)+'K':v.toFixed(0));}
function fmtN(v){return Number(v).toLocaleString();}
function pct(a,b){return b?((a/b)*100).toFixed(1)+'%':'0%';}

var dropZone=document.getElementById('dropZone');var fileInput=document.getElementById('fileInput');
dropZone.addEventListener('dragover',function(e){e.preventDefault();dropZone.classList.add('dragover');});
dropZone.addEventListener('dragleave',function(){dropZone.classList.remove('dragover');});
dropZone.addEventListener('drop',function(e){e.preventDefault();dropZone.classList.remove('dragover');if(e.dataTransfer.files.length)processFile(e.dataTransfer.files[0]);});
fileInput.addEventListener('change',function(){if(this.files.length)processFile(this.files[0]);});

function processFile(file){
  document.getElementById('uploadStatus').innerHTML='<span class="spinner"></span> Processing '+file.name+'...';
  var reader=new FileReader();
  reader.onload=function(e){
    try{var wb=XLSX.read(e.target.result,{type:'array',cellDates:true});var data=parseWorkbook(wb);buildDashboard(data);document.getElementById('uploadScreen').style.display='none';document.getElementById('dashboard').style.display='block';}
    catch(err){document.getElementById('uploadStatus').innerHTML='<span style="color:#DC2626">Error: '+err.message+'</span>';console.error(err);}

  makeChart('cARAging',{type:'bar',data:{labels:dpdBuckets,datasets:[{data:dpdBuckets.map(function(b){return sumBy(arByAging[b]||[],'_bal');}),backgroundColor:dpdColors,borderRadius:6,barPercentage:0.6}]},options:{responsive:true,maintainAspectRatio:false,onClick:function(e,el){if(!el.length)return;var b=dpdBuckets[el[0].index];var g=groupBy(arByAging[b]||[],'Office');var rows=topN(g,function(a){return sumBy(a,'_bal');},20).map(function(o){return[o.key,o.items.length,o.val];});openDrill('AR Aging: '+b,'Office breakdown',rows,['Office','Patients','Balance']);},scales:{y:{ticks:{callback:fmtK},grid:{color:'#E8EEFF'}},x:{grid:{display:false}}},plugins:{tooltip:{callbacks:{label:function(c){return fmt(c.parsed.y);}}}}}});

  var noteLabels=notesTop.map(function(n){return n.key.length>25?n.key.slice(0,23)+'..':n.key;});var noteFullNames=notesTop.map(function(n){return n.key;});
  makeChart('cBlockedNotes',{type:'bar',data:{labels:noteLabels,datasets:[{data:notesTop.map(function(n){return n.val;}),backgroundColor:['#0041C0','#335EEA','#8EA9FF','#C2D7FF','#42BA96','#7DD3C0','#A5B4FC','#C7D2FE','#DDD6FE'],borderRadius:6,barPercentage:0.6}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,onClick:function(e,el){if(!el.length)return;var n=noteFullNames[el[0].index];var g=groupBy(blockedNotes[n]||[],'Office');var rows=topN(g,function(a){return sumBy(a,'_bal');},20).map(function(o){return[o.key,o.items.length,o.val];});openDrill('Blocked: '+n,'Office breakdown',rows,['Office','Patients','Balance']);},scales:{x:{ticks:{callback:fmtK},grid:{color:'#E8EEFF'}},y:{grid:{display:false},ticks:{font:{size:9}}}},plugins:{tooltip:{callbacks:{label:function(c){return fmt(c.parsed.x);}}}}}});
}

function downloadOverviewPDF(){
  var arTab=document.getElementById('tab-ar');var btn=document.getElementById('downloadPdfBtn');var newBtn=document.getElementById('newFileBtn');var tabs=document.querySelector('.tabs');
  btn.style.display='none';if(newBtn)newBtn.style.display='none';if(tabs)tabs.style.display='none';arTab.style.display='none';
  window.print();
  setTimeout(function(){btn.style.display='flex';if(newBtn)newBtn.style.display='';if(tabs)tabs.style.display='flex';arTab.style.display='';arTab.classList.add('hidden');},500);
}
