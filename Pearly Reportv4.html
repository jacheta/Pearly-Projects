<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payments Report Generator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0B1121;font-family:'DM Sans',sans-serif;color:#F1F5F9}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#111B2E}
::-webkit-scrollbar-thumb{background:#1E2D4A;border-radius:3px}
.tabs button{background:transparent;border:1px solid transparent;color:#64748B;border-radius:8px;padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif}
.tabs button.active{background:rgba(59,130,246,.12);border-color:rgba(59,130,246,.3);color:#60A5FA}
.tabs button:hover:not(.active){color:#94A3B8}
.cards{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:28px}
.card{background:#111B2E;border:1px solid #1E2D4A;border-radius:12px;padding:24px 20px;flex:1;min-width:200px}
.card.accent{border-color:rgba(59,130,246,.25)}
.card-label{color:#64748B;font-size:12px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px}
.card-value{font-size:24px;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:-.02em}
.card.accent .card-value{color:#60A5FA}
.card-sub{color:#94A3B8;font-size:12px;margin-top:4px}
.section{background:#111B2E;border:1px solid #1E2D4A;border-radius:12px;padding:24px;margin-bottom:24px}
.section h2{font-size:18px;font-weight:700;margin-bottom:4px}
.section .sub{color:#64748B;font-size:13px;margin-bottom:16px}
.row{display:flex;gap:20px;margin-bottom:24px;flex-wrap:wrap}
.row>.section{margin-bottom:0}
table{width:100%;border-collapse:collapse;font-size:13px;border-spacing:0}
th{text-align:right;padding:10px 12px;color:#64748B;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid #1E2D4A}
th:first-child{text-align:left}
td{padding:10px 12px;text-align:right;border-bottom:1px solid rgba(30,45,74,.12)}
td:first-child{text-align:left}
.mono{font-family:'JetBrains Mono',monospace;font-size:12px}
.green{color:#10B981}.red{color:#EF4444}.purple{color:#8B5CF6}.dim{color:#94A3B8}.bold{font-weight:700}
.total-row td{border-top:2px solid #1E2D4A;border-bottom:none;padding:12px;font-weight:700}
canvas{max-width:100%}
.funnel{display:flex;gap:20px;align-items:center;justify-content:center;padding:20px 0;flex-wrap:wrap}
.funnel-item{text-align:center}.funnel-label{color:#64748B;font-size:12px;font-weight:600;text-transform:uppercase;margin-bottom:6px}
.funnel-value{font-size:24px;font-weight:700;font-family:'JetBrains Mono',monospace}
.funnel-sub{color:#94A3B8;font-size:12px;margin-top:4px}.funnel-arrow{color:#64748B;font-size:28px;padding:0 8px}
.legend{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:12px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px}
.legend-dot{width:10px;height:10px;border-radius:3px}
.legend-val{color:#F1F5F9;font-weight:600;font-family:'JetBrains Mono',monospace;font-size:11px}
.legend-label{color:#94A3B8}
.hidden{display:none}
.click-hint{color:#64748B;font-size:11px;text-align:center;margin-top:8px;font-style:italic}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.show{display:flex}
.modal{background:#111B2E;border:1px solid #1E2D4A;border-radius:16px;padding:28px;max-width:700px;width:90%;max-height:80vh;overflow-y:auto;position:relative;box-shadow:0 24px 48px rgba(0,0,0,.4)}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:1px solid #1E2D4A;color:#94A3B8;width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif}
.modal-close:hover{background:#1E2D4A;color:#F1F5F9}
.modal h3{font-size:17px;font-weight:700;margin-bottom:4px}
.modal .sub{color:#64748B;font-size:13px;margin-bottom:16px}
/* Upload */
#uploadScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px}
.upload-box{background:#111B2E;border:2px dashed #1E2D4A;border-radius:16px;padding:60px 40px;text-align:center;max-width:500px;width:100%;cursor:pointer;transition:all .2s}
.upload-box:hover,.upload-box.dragover{border-color:#3B82F6;background:#111B2E}
.upload-box h2{font-size:20px;margin-bottom:8px}
.upload-box p{color:#64748B;font-size:14px;margin-bottom:20px}
.upload-btn{background:linear-gradient(135deg,#3B82F6,#8B5CF6);color:#fff;border:none;padding:12px 28px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.upload-btn:hover{opacity:.9}
#uploadStatus{margin-top:16px;color:#94A3B8;font-size:13px}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid #1E2D4A;border-top-color:#3B82F6;border-radius:50%;animation:spin .6s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
#dashboard{display:none}
#newFileBtn{background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.3);color:#60A5FA;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;margin-left:auto}
#newFileBtn:hover{background:rgba(59,130,246,.25)}
@media print{
  body{background:#0B1121 !important;-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important;color-adjust:exact !important}
  *{-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important}
  #uploadScreen,.modal-overlay{display:none !important}
  .section,.card,.cards{break-inside:avoid}
  .click-hint{display:none}
  @page{margin:0.3in;size:letter}
}
</style>
</head>
<body>

<div class="modal-overlay" id="drillModal"><div class="modal"><button class="modal-close" onclick="closeDrill()">✕</button><h3 id="drillTitle"></h3><p class="sub" id="drillSub"></p><div id="drillContent"></div></div></div>

<!-- UPLOAD SCREEN -->
<div id="uploadScreen">
  <div style="display:flex;align-items:center;gap:14px;margin-bottom:32px">
    <div style="width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#3B82F6,#8B5CF6);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#fff">P</div>
    <div><h1 style="font-size:24px;font-weight:700">Payments Report Generator</h1><span style="color:#64748B;font-size:13px">Upload an Excel payments report to generate your dashboard</span></div>
  </div>
  <div class="upload-box" id="dropZone" onclick="document.getElementById('fileInput').click()">
    <h2>Drop your file here</h2>
    <p>or click to browse — accepts .xlsx payments reports</p>
    <button class="upload-btn" onclick="event.stopPropagation();document.getElementById('fileInput').click()">Choose File</button>
    <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none">
  </div>
  <div id="uploadStatus"></div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div id="header" style="background:linear-gradient(135deg,#0F1A2E 0%,#162038 50%,#1A1040 100%);border-bottom:1px solid #1E2D4A;padding:28px 32px 20px">
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:6px">
      <div style="width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#3B82F6,#8B5CF6);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff" id="logoLetter">S</div>
      <div style="flex:1"><h1 style="font-size:22px;font-weight:700;letter-spacing:-.02em" id="reportTitle">Payments Report</h1><span style="color:#64748B;font-size:13px" id="reportSubtitle"></span></div>
      <button id="newFileBtn" onclick="location.reload()">↑ Upload New File</button>
    </div>
    <div class="tabs" style="display:flex;gap:4px;margin-top:18px">
      <button class="active" onclick="showTab('overview',this)">Overview</button>
      <button onclick="showTab('ar',this)">AR Status</button>
    </div>
  </div>
  <div style="padding:24px 32px 48px;max-width:1200px;margin:0 auto">
    <div id="tab-overview"></div>
    <div id="tab-ar" class="hidden"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
// ===== GLOBALS =====
var charts = [];
var D = {}; // drill-down data

function fmt(v){return '$'+Number(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtK(v){return '$'+(v>=1e6?(v/1e6).toFixed(1)+'M':v>=1e3?(v/1e3).toFixed(1)+'K':v.toFixed(0));}
function fmtN(v){return Number(v).toLocaleString();}
function pct(a,b){return b?((a/b)*100).toFixed(1)+'%':'0%';}

// ===== FILE HANDLING =====
var dropZone=document.getElementById('dropZone');
var fileInput=document.getElementById('fileInput');
dropZone.addEventListener('dragover',function(e){e.preventDefault();dropZone.classList.add('dragover');});
dropZone.addEventListener('dragleave',function(){dropZone.classList.remove('dragover');});
dropZone.addEventListener('drop',function(e){e.preventDefault();dropZone.classList.remove('dragover');if(e.dataTransfer.files.length)processFile(e.dataTransfer.files[0]);});
fileInput.addEventListener('change',function(){if(this.files.length)processFile(this.files[0]);});

function processFile(file){
  document.getElementById('uploadStatus').innerHTML='<span class="spinner"></span> Processing '+file.name+'...';
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(e.target.result,{type:'array',cellDates:true});
      var data=parseWorkbook(wb);
      buildDashboard(data);
      document.getElementById('uploadScreen').style.display='none';
      document.getElementById('dashboard').style.display='block';
    }catch(err){
      document.getElementById('uploadStatus').innerHTML='<span style="color:#EF4444">Error: '+err.message+'</span>';
      console.error(err);
    }
  };
  reader.readAsArrayBuffer(file);
}

// ===== PARSER =====
function parseSheet(wb,name){
  var ws=wb.Sheets[name];
  if(!ws)return[];
  var raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
  // Find header row (row with "Office" in first col)
  var hIdx=-1;
  for(var i=0;i<Math.min(10,raw.length);i++){if(raw[i]&&raw[i][0]==='Office'){hIdx=i;break;}}
  if(hIdx<0)return[];
  var headers=raw[hIdx];
  var rows=[];
  for(var i=hIdx+1;i<raw.length;i++){
    var r=raw[i];
    if(!r||!r[0]||r[0]==='Office')continue;
    var obj={};
    for(var j=0;j<headers.length;j++){obj[headers[j]]=r[j];}
    rows.push(obj);
  }
  return rows;
}

function parseWorkbook(wb){
  // Metadata from first sheet
  var ws1=wb.Sheets[wb.SheetNames[0]];
  var raw1=XLSX.utils.sheet_to_json(ws1,{header:1,defval:null});
  var groupName=(raw1[0]&&raw1[0][1])||'Report';
  var asOfDate=(raw1[2]&&raw1[2][1])||'';
  var reportDesc=(raw1[1]&&raw1[1][1])||'';
  var daysMatch=reportDesc.match(/(\d+)\s*Days/);
  var days=daysMatch?daysMatch[1]:'';

  var proc=parseSheet(wb,'Processed for Posting');
  var pp=parseSheet(wb,'Prompted + Processed');
  var ar=parseSheet(wb,'AR Status Report');
  var po=parseSheet(wb,'Payout Report');

  // Process
  proc.forEach(function(r){r._amt=Number(r['Processed Amount'])||0;r._fees=Number(r['Processing Fees'])||0;r._net=Number(r['Net Deposit'])||0;
    var d=r['Paid Date'];if(d instanceof Date){r._month=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}else if(typeof d==='string'){var p=d.split('/');if(p.length===3)r._month=p[2]+'-'+p[0].padStart(2,'0');}else if(typeof d==='number'){var dt=new Date((d-25569)*86400000);r._month=dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0');}
  });
  pp.forEach(function(r){r._amt=Number(r['Amount'])||0;
    var d=r['Date'];if(d instanceof Date){r._month=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}else if(typeof d==='string'){var p=d.split('/');if(p.length===3)r._month=p[2]+'-'+p[0].padStart(2,'0');}else if(typeof d==='number'){var dt=new Date((d-25569)*86400000);r._month=dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0');}
    r._letters=Number(r['Letter Touchpoints'])||0;r._texts=Number(r['Text Touchpoints'])||0;r._emails=Number(r['Email Touchpoints'])||0;
  });
  ar.forEach(function(r){r._bal=Number(r['Patient Balance'])||0;r._letters=Number(r['Letter Touchpoints'])||0;r._texts=Number(r['Text Touchpoints'])||0;r._emails=Number(r['Email Touchpoints'])||0;});
  po.forEach(function(r){r._net=Number(r['Net Bank Payout'])||0;});

  return{groupName:groupName,asOfDate:asOfDate,days:days,proc:proc,pp:pp,ar:ar,po:po};
}

// ===== AGGREGATION HELPERS =====
function groupBy(arr,key){var m={};arr.forEach(function(r){var k=r[key]||'Unknown';if(!m[k])m[k]=[];m[k].push(r);});return m;}
function sumBy(arr,field){return arr.reduce(function(s,r){return s+(r[field]||0);},0);}
function topN(obj,valFn,n){return Object.keys(obj).map(function(k){return{key:k,val:valFn(obj[k]),items:obj[k]};}).sort(function(a,b){return b.val-a.val;}).slice(0,n||15);}

// ===== TAB SWITCHING =====
function showTab(id,btn){
  ['overview','ar'].forEach(function(t){document.getElementById('tab-'+t).classList.add('hidden');});
  document.getElementById('tab-'+id).classList.remove('hidden');
  document.querySelectorAll('.tabs button').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
}

// ===== DRILL MODAL =====
function openDrill(title,sub,rows,headers){
  document.getElementById('drillTitle').textContent=title;
  document.getElementById('drillSub').textContent=sub;
  rows.sort(function(a,b){return(b[2]||0)-(a[2]||0);});
  var h='<table><thead><tr>';
  headers.forEach(function(x,i){h+='<th'+(i===0?' style="text-align:left"':'')+'>'+x+'</th>';});
  h+='</tr></thead><tbody>';
  rows.forEach(function(r){h+='<tr>';r.forEach(function(v,i){if(i===0)h+='<td>'+v+'</td>';else if(typeof v==='number'&&v>100)h+='<td class="mono">'+fmt(v)+'</td>';else h+='<td class="mono dim">'+(typeof v==='number'?fmtN(v):v)+'</td>';});h+='</tr>';});
  h+='</tbody></table>';
  document.getElementById('drillContent').innerHTML=h;
  document.getElementById('drillModal').classList.add('show');
}
function closeDrill(){document.getElementById('drillModal').classList.remove('show');}
document.getElementById('drillModal').addEventListener('click',function(e){if(e.target===this)closeDrill();});

// ===== CHART HELPER =====
function makeChart(id,cfg){
  var el=document.getElementById(id);
  if(!el)return null;
  var c=new Chart(el,cfg);
  charts.push(c);
  return c;
}

// ===== BUILD DASHBOARD =====
function buildDashboard(data){
  charts.forEach(function(c){c.destroy();});charts=[];
  var P=data.proc, PP=data.pp, AR=data.ar, PO=data.po;

  // Header
  document.getElementById('logoLetter').textContent=data.groupName.charAt(0);
  document.getElementById('reportTitle').textContent=data.groupName+' — Payments Report';
  document.getElementById('reportSubtitle').textContent=(data.days?data.days+' Days · ':'')+Object.keys(groupBy(PP,'Office')).length+' Offices · As of '+data.asOfDate;

  // Metrics - Overview uses Prompted + Processed data
  var ppTotal=sumBy(PP,'_amt'), ppCount=PP.length;
  var nOffices=Object.keys(groupBy(PP,'Office')).length;
  var prompted=PP.filter(function(r){return r.Type==='Prompted';}), processed=PP.filter(function(r){return r.Type==='Processed';});
  var promptedTotal=sumBy(prompted,'_amt'), processedTotal=sumBy(processed,'_amt');
  var promptedCount=prompted.length, processedCount=processed.length;
  var totalAR=sumBy(AR,'_bal'), nPatients=AR.length;
  var blocked=AR.filter(function(r){return r['AR Status']==='Blocked';}), engaged=AR.filter(function(r){return r['AR Status']==='Engaged';});
  var ar90=AR.filter(function(r){return r['Aging Bucket']==='90+';});
  var totalPayout=sumBy(PO,'_net'), nPayouts=PO.length;
  var collRate=ppCount/(ppCount+engaged.length)*100;

  // Monthly - from PP
  var byMonth=groupBy(PP,'_month');
  var months=Object.keys(byMonth).filter(function(m){return m&&m!=='undefined';}).sort();
  var monthNames=['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  function mlabel(m){var p=m.split('-');return monthNames[parseInt(p[1])]+" '"+p[0].slice(2);}

  // Office aggregates - from PP
  var byOffice=groupBy(PP,'Office');
  var officeTop=topN(byOffice,function(a){return sumBy(a,'_amt');},15);

  // DPD - from PP
  var byDPD=groupBy(PP,'DPD Bucket');
  var dpdBuckets=['<30','30-60','60-90','90+'];
  var dpdColors=['#10B981','#F59E0B','#F97316','#EF4444'];

  // AR
  var arByStatus=groupBy(AR,'AR Status');
  var arByAging=groupBy(AR,'Aging Bucket');
  var arByOffice=groupBy(AR,'Office');
  var arOfficeTop=topN(arByOffice,function(a){return sumBy(a,'_bal');},20);

  // Blocked notes
  var blockedNotes=groupBy(blocked,'Notes');
  var notesTop=topN(blockedNotes,function(a){return sumBy(a,'_bal');},9);

  // Payout by office
  var poByOffice=groupBy(PO,'Office');
  var poTop=topN(poByOffice,function(a){return sumBy(a,'_net');},15);

  // Letters - from PP touchpoints
  var ppByOffice=groupBy(PP,'Office');
  var ppOfficeLetters=topN(ppByOffice,function(a){return sumBy(a,'_letters');},15).filter(function(x){return x.val>0;});

  // PP by DPD (for collection rate)
  var ppByDPDAll=groupBy(PP,'DPD Bucket');
  var engByDPD=groupBy(engaged,'Aging Bucket');

  // Store drill data
  D={byMonth:byMonth,byDPD:byDPD,byOffice:byOffice,arByStatus:arByStatus,arByAging:arByAging,blockedNotes:blockedNotes,mlabel:mlabel};

  // ===== RENDER OVERVIEW (Prompted + Processed) =====
  var ov=document.getElementById('tab-overview');
  ov.innerHTML='<div style="display:flex;justify-content:flex-end;margin-bottom:16px"><button id="downloadPdfBtn" onclick="downloadOverviewPDF()" style="background:linear-gradient(135deg,#3B82F6,#8B5CF6);color:#fff;border:none;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:\'DM Sans\',sans-serif;display:flex;align-items:center;gap:8px"><span>↓</span> Download as PDF</button></div>'
    +'<div id="overviewContent"><div class="cards">'
    +'<div class="card accent"><div class="card-label">A/R Reduction</div><div class="card-value">'+fmt(ppTotal)+'</div><div class="card-sub">'+fmtN(ppCount)+' total activities</div></div>'
    +'<div class="card"><div class="card-label">Prompted</div><div class="card-value">'+fmt(promptedTotal)+'</div><div class="card-sub">'+fmtN(promptedCount)+' prompts sent</div></div>'
    +'<div class="card"><div class="card-label">Processed</div><div class="card-value">'+fmt(processedTotal)+'</div><div class="card-sub">'+fmtN(processedCount)+' payments collected</div></div>'
    +'<div class="card"><div class="card-label">Collection Rate</div><div class="card-value">'+collRate.toFixed(1)+'%</div><div class="card-sub">A/R Reduction ÷ (A/R Reduction + Engaged)</div></div>'
    +'</div>'
    +'<div class="section"><h2>Monthly A/R Reduction Volume</h2><p class="sub">Prompted + Processed · Click a bar to drill down</p><div style="height:260px"><canvas id="cMonthly"></canvas></div><p class="click-hint">Click any bar to see office breakdown</p></div>'
    +'<div class="row"><div class="section" style="flex:2;min-width:400px"><h2>Top Offices by A/R Reduction</h2><p class="sub">Click to drill down</p><div style="height:'+Math.max(280,officeTop.length*24)+'px"><canvas id="cOffice"></canvas></div><p class="click-hint">Click for DPD & monthly detail</p></div>'
    +'<div class="section" style="flex:1;min-width:300px"><h2>DPD Distribution</h2><p class="sub">Days past due</p><div style="height:220px"><canvas id="cDPD"></canvas></div><p class="click-hint">Click slice for office breakdown</p></div></div>'
    +'<div class="section"><h2>Collection Rate by DPD</h2><p class="sub">Collected ÷ (Total Engaged + Collected)</p><div class="row" style="margin-bottom:0;gap:14px"><div style="flex:1;min-width:340px;height:240px"><canvas id="cCollDPD"></canvas></div><div style="flex:1;min-width:300px;overflow-x:auto"><table><thead><tr><th>DPD</th><th>Total Engaged</th><th>Collected</th><th>Total</th><th>Rate</th></tr></thead><tbody id="collTableBody"></tbody></table></div></div></div>'
    +'<div class="section"><h2>Office Detail</h2><div style="overflow-x:auto"><table><thead><tr><th>Office</th><th>Activities</th><th>Prompted</th><th>Processed</th><th>Total</th></tr></thead><tbody id="officeTableBody"></tbody></table></div></div>'
    +'<div class="section"><h2>Letters Sent by Office</h2><p class="sub">From Prompted + Processed touchpoints</p><div class="row" style="margin-bottom:0;gap:14px"><div style="flex:1;min-width:400px;height:'+Math.max(280,ppOfficeLetters.length*24)+'px"><canvas id="cLetters"></canvas></div><div style="flex:1;min-width:300px;overflow-x:auto"><table><thead><tr><th>Office</th><th>Texts</th><th>Emails</th><th>Letters</th></tr></thead><tbody id="lettersTableBody"></tbody></table></div></div></div></div>';

  // Office table - showing Prompted vs Processed per office
  var otb=document.getElementById('officeTableBody');
  officeTop.forEach(function(o){
    var prom=o.items.filter(function(r){return r.Type==='Prompted';});
    var proc=o.items.filter(function(r){return r.Type==='Processed';});
    otb.innerHTML+='<tr><td>'+o.key+'</td><td class="mono dim">'+fmtN(o.items.length)+'</td><td class="mono" style="color:#F59E0B">'+fmt(sumBy(prom,'_amt'))+'</td><td class="mono green">'+fmt(sumBy(proc,'_amt'))+'</td><td class="mono bold">'+fmt(o.val)+'</td></tr>';
  });
  otb.innerHTML+='<tr class="total-row"><td>All '+nOffices+' Offices</td><td class="mono">'+fmtN(ppCount)+'</td><td class="mono" style="color:#F59E0B">'+fmt(promptedTotal)+'</td><td class="mono green">'+fmt(processedTotal)+'</td><td class="mono">'+fmt(ppTotal)+'</td></tr>';

  // Letters table - from PP
  var ltb=document.getElementById('lettersTableBody');
  var totalLetters=0,totalTexts=0,totalEmails=0;
  Object.keys(ppByOffice).forEach(function(k){var a=ppByOffice[k];totalLetters+=sumBy(a,'_letters');totalTexts+=sumBy(a,'_texts');totalEmails+=sumBy(a,'_emails');});
  ppOfficeLetters.forEach(function(o){var t=sumBy(o.items,'_texts'),e=sumBy(o.items,'_emails');ltb.innerHTML+='<tr><td>'+o.key+'</td><td class="mono dim">'+fmtN(t)+'</td><td class="mono dim">'+fmtN(e)+'</td><td class="mono bold" style="color:#60A5FA">'+fmtN(o.val)+'</td></tr>';});
  ltb.innerHTML+='<tr class="total-row"><td>All Offices</td><td class="mono">'+fmtN(totalTexts)+'</td><td class="mono">'+fmtN(totalEmails)+'</td><td class="mono" style="color:#60A5FA">'+fmtN(totalLetters)+'</td></tr>';

  // Charts - Overview
  Chart.defaults.color='#94A3B8';Chart.defaults.borderColor='#1E2D4A';Chart.defaults.font.family="'DM Sans',sans-serif";Chart.defaults.font.size=12;Chart.defaults.plugins.legend.display=false;

  makeChart('cMonthly',{type:'bar',data:{labels:months.map(mlabel),datasets:[
    {label:'Processed',data:months.map(function(m){var items=byMonth[m]||[];return sumBy(items.filter(function(r){return r.Type==='Processed';}),'_amt');}),backgroundColor:'#10B981',borderRadius:6,barPercentage:0.5},
    {label:'Prompted',data:months.map(function(m){var items=byMonth[m]||[];return sumBy(items.filter(function(r){return r.Type==='Prompted';}),'_amt');}),backgroundColor:'#F59E0B',borderRadius:6,barPercentage:0.5}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,labels:{color:'#94A3B8',font:{size:11}}},tooltip:{callbacks:{label:function(c){return c.dataset.label+': '+fmt(c.parsed.y);}}}},onClick:function(e,el){if(!el.length)return;var m=months[el[0].index];var g=groupBy(byMonth[m],'Office');var rows=topN(g,function(a){return sumBy(a,'_amt');},20).map(function(o){return[o.key,o.items.length,o.val];});openDrill(mlabel(m)+' Breakdown','Office detail',rows,['Office','Activities','Amount']);},scales:{y:{stacked:true,ticks:{callback:fmtK},grid:{color:'#1E2D4A33'}},x:{stacked:true,grid:{display:false}}}}});

  var offLabels=officeTop.map(function(o){return o.key.length>28?o.key.slice(0,26)+'..':o.key;});
  var offFullNames=officeTop.map(function(o){return o.key;});
  makeChart('cOffice',{type:'bar',data:{labels:offLabels,datasets:[{data:officeTop.map(function(o){return o.val;}),backgroundColor:'#10B981',borderRadius:6,barPercentage:0.6}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,onClick:function(e,el){if(!el.length)return;var name=offFullNames[el[0].index];var items=byOffice[name]||[];var dg=groupBy(items,'DPD Bucket'),mg=groupBy(items,'_month');var tg=groupBy(items,'Type');var rows=[];if(tg['Prompted'])rows.push(['Prompted',tg['Prompted'].length,sumBy(tg['Prompted'],'_amt')]);if(tg['Processed'])rows.push(['Processed',tg['Processed'].length,sumBy(tg['Processed'],'_amt')]);rows.push(['---','','']);dpdBuckets.forEach(function(b){if(dg[b])rows.push([b+' DPD',dg[b].length,sumBy(dg[b],'_amt')]);});rows.push(['---','','']);Object.keys(mg).sort().forEach(function(m){rows.push([mlabel(m),mg[m].length,sumBy(mg[m],'_amt')]);});openDrill(name,'Type, DPD & monthly breakdown',rows,['Segment','Count','Amount']);},scales:{x:{ticks:{callback:fmtK},grid:{color:'#1E2D4A33'}},y:{grid:{display:false},ticks:{font:{size:10}}}},plugins:{tooltip:{callbacks:{label:function(c){return fmt(c.parsed.x);}}}}}});

  makeChart('cDPD',{type:'doughnut',data:{labels:dpdBuckets,datasets:[{data:dpdBuckets.map(function(b){return sumBy(byDPD[b]||[],'_amt');}),backgroundColor:dpdColors,borderWidth:0,spacing:3}]},options:{responsive:true,maintainAspectRatio:false,cutout:'58%',onClick:function(e,el){if(!el.length)return;var b=dpdBuckets[el[0].index];var g=groupBy(byDPD[b]||[],'Office');var rows=topN(g,function(a){return sumBy(a,'_amt');},20).map(function(o){return[o.key,o.items.length,o.val];});openDrill('DPD: '+b+' Days','Office breakdown',rows,['Office','Txns','Processed']);},plugins:{tooltip:{callbacks:{label:function(c){return c.label+': '+fmt(c.parsed);}}}}}});

  // Collection Rate table + chart (in Overview)
  var ctb=document.getElementById('collTableBody');
  var collRates=[];
  dpdBuckets.forEach(function(b){
    var ppC=(ppByDPDAll[b]||[]).length, engC=(engByDPD[b]||[]).length, tot=ppC+engC, rate=tot?ppC/tot*100:0;
    collRates.push(rate);
    ctb.innerHTML+='<tr><td>'+(b==='<30'?'&lt;30':b)+'</td><td class="mono dim">'+fmtN(ppC)+'</td><td class="mono dim">'+fmtN(engC)+'</td><td class="mono dim">'+fmtN(tot)+'</td><td class="mono bold" style="color:'+dpdColors[dpdBuckets.indexOf(b)]+'">'+rate.toFixed(1)+'%</td></tr>';
  });
  ctb.innerHTML+='<tr class="total-row"><td>Total</td><td class="mono">'+fmtN(ppCount)+'</td><td class="mono">'+fmtN(engaged.length)+'</td><td class="mono">'+fmtN(ppCount+engaged.length)+'</td><td class="mono bold">'+collRate.toFixed(1)+'%</td></tr>';

  makeChart('cCollDPD',{type:'bar',data:{labels:dpdBuckets,datasets:[{data:collRates,backgroundColor:dpdColors,borderRadius:6,barPercentage:0.6}]},options:{responsive:true,maintainAspectRatio:false,scales:{y:{ticks:{callback:function(v){return v+'%';}},grid:{color:'#1E2D4A33'},max:100},x:{grid:{display:false}}},plugins:{tooltip:{callbacks:{label:function(c){return c.parsed.y.toFixed(1)+'%';}}}}}});

  makeChart('cLetters',{type:'bar',data:{labels:ppOfficeLetters.map(function(o){return o.key.length>25?o.key.slice(0,23)+'..':o.key;}),datasets:[{data:ppOfficeLetters.map(function(o){return o.val;}),backgroundColor:'#60A5FA',borderRadius:6,barPercentage:0.6}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,scales:{x:{grid:{color:'#1E2D4A33'}},y:{grid:{display:false},ticks:{font:{size:9}}}},plugins:{tooltip:{callbacks:{label:function(c){return c.parsed.x+' letters';}}}}}});

  // ===== RENDER AR STATUS =====
  var statusOrder=['Blocked','Engaged','Follow Up','Outstanding','Scheduled'];
  var statusColors=['#EF4444','#10B981','#8B5CF6','#F59E0B','#3B82F6'];
  var activeStatuses=statusOrder.filter(function(s){return arByStatus[s]&&arByStatus[s].length;});

  var artab=document.getElementById('tab-ar');
  artab.innerHTML='<div class="cards">'
    +'<div class="card accent"><div class="card-label">Total AR Balance</div><div class="card-value">'+fmt(totalAR)+'</div><div class="card-sub">'+fmtN(nPatients)+' patients</div></div>'
    +'<div class="card"><div class="card-label">90+ Days</div><div class="card-value">'+fmt(sumBy(ar90,'_bal'))+'</div><div class="card-sub">'+pct(sumBy(ar90,'_bal'),totalAR)+' of total · '+fmtN(ar90.length)+' patients</div></div>'
    +'<div class="card"><div class="card-label">Blocked</div><div class="card-value">'+fmt(sumBy(blocked,'_bal'))+'</div><div class="card-sub">'+fmtN(blocked.length)+' patients</div></div>'
    +'<div class="card"><div class="card-label">Engaged</div><div class="card-value">'+fmt(sumBy(engaged,'_bal'))+'</div><div class="card-sub">'+fmtN(engaged.length)+' patients</div></div>'
    +'</div>'
    +'<div class="row"><div class="section" style="flex:1;min-width:340px"><h2>AR by Status</h2><p class="sub">Click slice for office breakdown</p><div style="height:220px"><canvas id="cARStatus"></canvas></div></div>'
    +'<div class="section" style="flex:1;min-width:340px"><h2>AR by Aging Bucket</h2><p class="sub">Click bar for office breakdown</p><div style="height:220px"><canvas id="cARAging"></canvas></div></div></div>'
    +'<div class="section"><h2>Blocked Reasons</h2><p class="sub">Click a bar for office breakdown</p><div class="row" style="margin-bottom:0;gap:14px"><div style="flex:1;min-width:400px;height:'+Math.max(200,notesTop.length*28)+'px"><canvas id="cBlockedNotes"></canvas></div><div style="flex:1;min-width:300px;overflow-x:auto"><table><thead><tr><th>Reason</th><th>Patients</th><th>Balance</th></tr></thead><tbody id="notesTableBody"></tbody></table></div></div></div>'
    +'<div class="section"><h2>AR by Office (Top 20)</h2><div style="overflow-x:auto"><table><thead><tr><th>Office</th><th>Patients</th><th>Balance</th><th>Avg</th></tr></thead><tbody id="arOfficeTableBody"></tbody></table></div></div>';

  // Notes table
  var ntb=document.getElementById('notesTableBody');
  notesTop.forEach(function(n){ntb.innerHTML+='<tr><td>'+n.key+'</td><td class="mono dim">'+fmtN(n.items.length)+'</td><td class="mono bold">'+fmt(n.val)+'</td></tr>';});
  ntb.innerHTML+='<tr class="total-row"><td>Total</td><td class="mono">'+fmtN(blocked.length)+'</td><td class="mono">'+fmt(sumBy(blocked,'_bal'))+'</td></tr>';

  // AR office table
  var aotb=document.getElementById('arOfficeTableBody');
  arOfficeTop.forEach(function(o){var avg=o.val/o.items.length;aotb.innerHTML+='<tr><td>'+o.key+'</td><td class="mono dim">'+fmtN(o.items.length)+'</td><td class="mono bold">'+fmt(o.val)+'</td><td class="mono dim">'+fmt(avg)+'</td></tr>';});
  aotb.innerHTML+='<tr class="total-row"><td>All Offices</td><td class="mono">'+fmtN(nPatients)+'</td><td class="mono">'+fmt(totalAR)+'</td><td class="mono dim">'+fmt(totalAR/nPatients)+'</td></tr>';

  // AR Charts
  makeChart('cARStatus',{type:'doughnut',data:{labels:activeStatuses,datasets:[{data:activeStatuses.map(function(s){return sumBy(arByStatus[s],'_bal');}),backgroundColor:activeStatuses.map(function(s){return statusColors[statusOrder.indexOf(s)];}),borderWidth:0,spacing:2}]},options:{responsive:true,maintainAspectRatio:false,cutout:'60%',onClick:function(e,el){if(!el.length)return;var s=activeStatuses[el[0].index];var g=groupBy(arByStatus[s],'Office');var rows=topN(g,function(a){return sumBy(a,'_bal');},20).map(function(o){return[o.key,o.items.length,o.val];});openDrill('AR: '+s,'Office breakdown',rows,['Office','Patients','Balance']);},plugins:{tooltip:{callbacks:{label:function(c){return c.label+': '+fmt(c.parsed);}}}}}});

  makeChart('cARAging',{type:'bar',data:{labels:dpdBuckets,datasets:[{data:dpdBuckets.map(function(b){return sumBy(arByAging[b]||[],'_bal');}),backgroundColor:dpdColors,borderRadius:6,barPercentage:0.6}]},options:{responsive:true,maintainAspectRatio:false,onClick:function(e,el){if(!el.length)return;var b=dpdBuckets[el[0].index];var g=groupBy(arByAging[b]||[],'Office');var rows=topN(g,function(a){return sumBy(a,'_bal');},20).map(function(o){return[o.key,o.items.length,o.val];});openDrill('AR Aging: '+b,'Office breakdown',rows,['Office','Patients','Balance']);},scales:{y:{ticks:{callback:fmtK},grid:{color:'#1E2D4A33'}},x:{grid:{display:false}}},plugins:{tooltip:{callbacks:{label:function(c){return fmt(c.parsed.y);}}}}}});

  var noteLabels=notesTop.map(function(n){return n.key.length>25?n.key.slice(0,23)+'..':n.key;});
  var noteFullNames=notesTop.map(function(n){return n.key;});
  makeChart('cBlockedNotes',{type:'bar',data:{labels:noteLabels,datasets:[{data:notesTop.map(function(n){return n.val;}),backgroundColor:['#EF4444','#F97316','#F59E0B','#3B82F6','#8B5CF6','#EC4899','#64748B','#06B6D4','#84CC16'],borderRadius:6,barPercentage:0.6}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,onClick:function(e,el){if(!el.length)return;var n=noteFullNames[el[0].index];var g=groupBy(blockedNotes[n]||[],'Office');var rows=topN(g,function(a){return sumBy(a,'_bal');},20).map(function(o){return[o.key,o.items.length,o.val];});openDrill('Blocked: '+n,'Office breakdown',rows,['Office','Patients','Balance']);},scales:{x:{ticks:{callback:fmtK},grid:{color:'#1E2D4A33'}},y:{grid:{display:false},ticks:{font:{size:9}}}},plugins:{tooltip:{callbacks:{label:function(c){return fmt(c.parsed.x);}}}}}});
}

function downloadOverviewPDF(){
  var arTab=document.getElementById('tab-ar');
  var uploadScreen=document.getElementById('uploadScreen');
  var btn=document.getElementById('downloadPdfBtn');
  var newBtn=document.getElementById('newFileBtn');
  var tabs=document.querySelector('.tabs');

  btn.style.display='none';
  if(newBtn)newBtn.style.display='none';
  if(tabs)tabs.style.display='none';
  arTab.style.display='none';
  if(uploadScreen)uploadScreen.style.display='none';

  window.print();

  setTimeout(function(){
    btn.style.display='flex';
    if(newBtn)newBtn.style.display='';
    if(tabs)tabs.style.display='flex';
    arTab.style.display='';
    arTab.classList.add('hidden');
  },500);
}
</script>
